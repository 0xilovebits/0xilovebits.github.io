<!-- 404.html -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>404 | Page Not Found</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: "Fira Code", monospace;
        background: #0d0d0d;
        color: #33ff99;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }
      h1 {
        font-size: 3em;
        margin-bottom: 0.2em;
        background: #1a1a1a;
        padding: 10px 20px;
        border-radius: 10px;
        box-shadow: inset 0 0 10px #00ff88;
      }
      p {
        font-size: 1.2em;
        color: #ccc;
        margin-bottom: 2em;
      }
      a {
        color: #33ff99;
        text-decoration: none;
        font-weight: 400;
        padding: 8px 16px;
        border: 1px solid #33ff99;
        border-radius: 8px;
        transition: 0.3s ease;
      }
      a:hover {
        background-color: #33ff99;
        color: #0d0d0d;
      }
    </style>
  </head>
  <body>
    <h1>404 — Not Found</h1>
    <p>Looks like you're lost in the matrix 🧩</p>
    <a href="/">← Back to Home</a>
  </body>
</html>
