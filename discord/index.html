<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Discord | Contact Info</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400&amp;display=swap" rel="stylesheet" />
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: "Fira Code", monospace;
        background: #0d0d0d;
        color: #33ff99;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }
      h1 {
        font-size: 2.5em;
        margin-bottom: 0.2em;
        background: #1a1a1a;
        padding: 10px 20px;
        border-radius: 10px;
        box-shadow: inset 0 0 10px #00ff88;
      }
      p {
        font-size: 1.4em;
        color: #ccc;
        margin-bottom: 1em;
      }
      .tag {
        background: #1a1a1a;
        padding: 8px 16px;
        border-radius: 8px;
        font-size: 1.3em;
        box-shadow: 0 0 10px #00ff88;
        color: #33ff99;
      }
      a {
        margin-top: 20px;
        color: #33ff99;
        text-decoration: none;
        border: 1px solid #33ff99;
        padding: 8px 16px;
        border-radius: 8px;
        transition: 0.3s;
      }
      a:hover {
        background-color: #33ff99;
        color: #0d0d0d;
      }
    </style>
  </head>
  <body>
    <h1>💬 Discord Username</h1>
    <p>You can contact me on Discord at:</p>
    <div class="tag">ilovebits</div>
    <a href="/">← Back to Home</a>
  </body>
</html>
